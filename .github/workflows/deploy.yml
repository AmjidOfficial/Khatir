name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install # ◄ Changed from 'npm ci' to be safer if lockfile is missing

      - name: Build project
        run: npx vite build --base=/Khatir/ # ◄ Explicitly passes the base directory during build
        env:
          VITE_DISABLE_TYPESCRIPT_CHECK: true # Bypasses minor strict type checks if any exist

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
